# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: requirements-txt-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2000']
      - id: mixed-line-ending
        args: [ "--fix=auto" ]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: secret scanning with detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            package.lock.json|
            skills-lock.json
          )$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: secret scanning and PII detection with gitleaks

  - repo: local
    hooks:
      - id: lint-markdown
        name: Markdown lint
        entry: node scripts/lint_markdown.mjs
        language: system
        types: [markdown]
        pass_filenames: true

      - id: check-skill-metadata
        name: Validate SKILL.md metadata and length
        entry: node scripts/check_skill_meta.mjs
        language: system
        files: ^skills/.*/SKILL\.md$
        pass_filenames: true
