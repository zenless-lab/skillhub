title = "skillhub PII and Secret Rules"

[extend]
# Keep all built-in gitleaks secret-detection rules and add PII rules on top.
useDefault = true

# ---------------------------------------------------------------------------
# Email addresses — block non-anonymous addresses
# ---------------------------------------------------------------------------
[[rules]]
id = "restrict-non-anonymous-emails"
description = "Non-anonymous email detected. Only GitHub/GitLab noreply and RFC 2606 placeholder domains are allowed."
regex = '''(?i)([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})'''
tags = ["email", "PII"]

[rules.allowlist]
regexes = [
  # GitHub anonymous (username@users.noreply.github.com and id+username@...)
  '''(?i).+@users\.noreply\.github\.com''',
  # GitLab anonymous (noreply.gitlab.com and users.noreply.gitlab.com)
  '''(?i).+@(users\.)?noreply\.gitlab\.com''',
  # RFC 2606 reserved documentation domains
  '''(?i).+@example\.(com|org|net)''',
]

# ---------------------------------------------------------------------------
# Public IPv4 addresses — block non-documentation addresses
# ---------------------------------------------------------------------------
[[rules]]
id = "restrict-public-ipv4"
description = "Public IPv4 detected. Excludes private, documentation, loopback, and well-known DNS addresses."
regex = '''\b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b'''
tags = ["ipv4", "PII"]

[rules.allowlist]
regexes = [
  # RFC 1918 Private Networks (10/8, 172.16/12, 192.168/16)
  '''\b10\.(?:[0-9]{1,3}\.){2}[0-9]{1,3}\b''',
  '''\b172\.(?:1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}\b''',
  '''\b192\.168\.[0-9]{1,3}\.[0-9]{1,3}\b''',
  # RFC 5737 Documentation/Test Networks (TEST-NET-1, 2, 3)
  '''\b192\.0\.2\.[0-9]{1,3}\b''',
  '''\b198\.51\.100\.[0-9]{1,3}\b''',
  '''\b203\.0\.113\.[0-9]{1,3}\b''',
  # Loopback, Default Route, Broadcast
  '''\b127\.(?:[0-9]{1,3}\.){2}[0-9]{1,3}\b''',
  '''\b0\.0\.0\.0\b''',
  '''\b255\.255\.255\.255\b''',
  # Google DNS
  '''\b8\.8\.8\.8\b''', '''\b8\.8\.4\.4\b''',
  # Cloudflare DNS
  '''\b1\.1\.1\.1\b''', '''\b1\.0\.0\.1\b''',
  # Quad9 DNS
  '''\b9\.9\.9\.9\b''', '''\b149\.112\.112\.112\b''',
  # OpenDNS
  '''\b208\.67\.222\.222\b''', '''\b208\.67\.220\.220\b''',
]

# Exclude files where version numbers can resemble IP addresses
paths = [
  '''^skills-lock\.json$''',
  '''\.secrets\.baseline''',
  '''\.gitleaks\.toml''',
]

# ---------------------------------------------------------------------------
# Public IPv6 addresses — block non-documentation addresses
# ---------------------------------------------------------------------------
[[rules]]
id = "restrict-public-ipv6"
description = "Public IPv6 detected. Excludes RFC 3849 documentation prefix, loopback, unspecified, and well-known DNS addresses."
regex = '''(?i)\b(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}\b|\b(?:[0-9a-fA-F]{1,4}:){1,7}:|\b:(?::[0-9a-fA-F]{1,4}){1,7}\b'''
tags = ["ipv6", "PII"]

[rules.allowlist]
regexes = [
  # RFC 3849 Documentation Prefix (2001:db8::/32)
  # Note: no trailing \b — addresses ending in `:` are not word-char boundaries.
  '''(?i)\b2001:(?:0?db8|4860:4860)''',
  # Loopback and Unspecified
  '''\b::1\b''',
  '''\b::\b''',
  # Google DNS64
  '''(?i)\b2001:4860:4860::8888\b''', '''(?i)\b2001:4860:4860::8844\b''',
  # Cloudflare DNS64
  '''(?i)\b2606:4700:4700::1111\b''', '''(?i)\b2606:4700:4700::1001\b''',
]

paths = [
  '''\.gitleaks\.toml''',
]
